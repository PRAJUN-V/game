{% extends "base.html" %}

{% block title %}Room: {{ room_id }}{% endblock %}

{% block content %}
<div class="flex flex-col md:flex-row gap-8 w-full max-w-6xl items-start">
    <!-- Left: Info & Controls -->
    <div class="w-full md:w-1/4 space-y-4">
        <div class="bg-gray-800 p-4 rounded shadow">
            <h2 class="text-lg font-bold border-b border-gray-700 pb-2 mb-2">Room: <span class="text-blue-400">{{ room_id }}</span></h2>
            <p>You: <span class="font-bold text-{{ color }}-400">{{ player_name }}</span></p>
            <div id="player-list" class="mt-4 space-y-2">
                <!-- Players will be listed here -->
            </div>
        </div>

        <div id="game-controls" class="bg-gray-800 p-4 rounded shadow space-y-4 hidden">
            <div class="text-center">
                <div id="dice-result" class="text-4xl mb-2">🎲</div>
                <button id="roll-btn" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold transition disabled:opacity-50">
                    Roll Dice
                </button>
            </div>
        </div>

        <div id="setup-controls" class="bg-gray-800 p-4 rounded shadow">
            <button id="start-btn" class="w-full bg-green-600 hover:bg-green-700 py-2 rounded font-bold transition">
                Start Game
            </button>
        </div>

        <div class="bg-gray-800 p-4 rounded shadow h-48 overflow-y-auto text-sm" id="game-logs">
            <p class="text-gray-500 italic">Waiting for players...</p>
        </div>
    </div>

    <!-- Middle: The Board -->
    <div class="w-full md:w-2/4 flex justify-center">
        <div id="ludo-board" class="relative w-[300px] h-[300px] sm:w-[450px] sm:h-[450px] bg-white grid grid-cols-15 grid-rows-15 border-2 border-gray-900 shadow-2xl">
            <!-- Board generated by JS -->
        </div>
    </div>

    <!-- Right: Pieces Info -->
    <div class="w-full md:w-1/4 bg-gray-800 p-4 rounded shadow">
        <h2 class="text-lg font-bold border-b border-gray-700 pb-2 mb-2">Your Pieces</h2>
        <div id="piece-controls" class="space-y-2">
            <!-- Piece move buttons will be here -->
        </div>
    </div>
</div>

<style>
    .cell { border: 1px solid #ddd; position: relative; }
    .red { background-color: #ef4444; }
    .green { background-color: #22c55e; }
    .yellow { background-color: #eab308; }
    .blue { background-color: #3b82f6; }
    .safe { background-color: #cbd5e1; }
    .piece { width: 80%; height: 80%; border-radius: 50%; border: 2px solid white; cursor: pointer; position: absolute; top: 10%; left: 10%; z-index: 10; transition: all 0.3s; }
    .piece.active { animation: pulse 1.5s infinite; border-color: yellow; border-width: 3px; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
</style>

<script>
    const roomId = "{{ room_id }}";
    const playerName = "{{ player_name }}";
    const myColor = "{{ color }}";
    const ws = new WebSocket(`ws://${window.location.host}/ws/${roomId}/${playerName}`);

    const board = document.getElementById('ludo-board');
    const rollBtn = document.getElementById('roll-btn');
    const startBtn = document.getElementById('start-btn');
    const logsDiv = document.getElementById('game-logs');
    const playerList = document.getElementById('player-list');
    const pieceControls = document.getElementById('piece-controls');

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'update') {
            updateUI(data.state);
        } else if (data.type === 'error') {
            alert(data.message);
        }
    };

    function updateUI(state) {
        // Update players
        playerList.innerHTML = state.players.map(p => `
            <div class="flex justify-between items-center p-2 rounded ${state.current_turn === p.color ? 'bg-gray-700 border-l-4 border-' + p.color + '-500' : ''}">
                <span>${p.name}</span>
                <span class="w-3 h-3 rounded-full bg-${p.color}-500"></span>
            </div>
        `).join('');

        // Logs
        logsDiv.innerHTML = state.logs.map(log => `<p>${log}</p>`).reverse().join('');

        // Controls
        if (state.game_started) {
            document.getElementById('setup-controls').classList.add('hidden');
            document.getElementById('game-controls').classList.remove('hidden');
            
            const isMyTurn = state.current_turn === myColor;
            rollBtn.disabled = !isMyTurn || state.dice_value !== 0;
            document.getElementById('dice-result').innerText = state.dice_value === 0 ? '🎲' : state.dice_value;

            // Piece Buttons
            const myPlayer = state.players.find(p => p.color === myColor);
            if (myPlayer) {
                pieceControls.innerHTML = myPlayer.pieces.map(p => `
                    <button onclick="movePiece(${p.id})" ${(!isMyTurn || state.dice_value === 0 || p.finished) ? 'disabled' : ''} 
                        class="w-full bg-gray-700 hover:bg-gray-600 p-2 rounded flex justify-between items-center disabled:opacity-50">
                        <span>Piece ${p.id + 1}</span>
                        <span>${p.finished ? '🏁' : (p.pos === -1 ? '🏠' : p.pos)}</span>
                    </button>
                `).join('');
            }
        }

        renderBoard(state);
    }

    function renderBoard(state) {
        board.innerHTML = '';
        // Create 15x15 grid
        for (let i = 0; i < 225; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const row = Math.floor(i / 15);
            const col = i % 15;

            // Colors for bases
            if (row < 6 && col < 6) cell.classList.add('red');
            if (row < 6 && col > 8) cell.classList.add('green');
            if (row > 8 && col < 6) cell.classList.add('blue');
            if (row > 8 && col > 8) cell.classList.add('yellow');

            // Paths
            if ((row === 7 && col > 0 && col < 7)) cell.classList.add('red');
            if ((col === 7 && row > 0 && row < 7)) cell.classList.add('green');
            if ((row === 7 && col > 7 && col < 14)) cell.classList.add('yellow');
            if ((col === 7 && row > 7 && row < 14)) cell.classList.add('blue');

            // Winner center
            if (row >= 6 && row <= 8 && col >= 6 && col <= 8) cell.classList.add('safe', 'bg-gradient-to-br', 'from-red-500', 'via-green-500', 'to-yellow-500');

            board.appendChild(cell);
        }

        // Render Pieces (Simplified - this needs a mapping from pos to grid)
        // For now, we will just show pieces in the log/buttons
    }

    rollBtn.onclick = () => ws.send(JSON.stringify({action: 'roll'}));
    startBtn.onclick = () => ws.send(JSON.stringify({action: 'start'}));
    window.movePiece = (id) => ws.send(JSON.stringify({action: 'move', piece_id: id}));

</script>
{% endblock %}
