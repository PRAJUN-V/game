<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ludo Online{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="p-4 bg-gray-800 shadow-md">
        <h1 class="text-2xl font-bold text-center text-blue-400">Ludo Online 🎲</h1>
    </header>
    
    <main class="flex-grow flex items-center justify-center p-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="p-4 bg-gray-800 text-center text-gray-400 text-sm">
        Made with ❤️ for you
    </footer>
</body>
</html>
